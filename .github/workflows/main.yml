name: Django CI

on:
    push:
        branches: [ "main", "master"]
    pull_request:
        branches: [ "main", "develop"]

jobs:

    linting:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
            -   name: Set up Python
                uses: actions/setup-python@v5
                with:
                    python-version: "3.13"

            -   name: Install Linting Tools
                run: |
                    pip install flake8 black isort

            -   name: Run Black check
                run: black .

            -   name: Run Isort check
                run: isort .

            -   name: Run Flake8
                run: flake8 .


    tests:
        runs-on: ubuntu-latest
        needs: linting


        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: user
                    POSTGRES_PASSWORD: password
                    POSTGRES_DB: test_db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

            redis:
                image: redis:7
                ports:
                    - 6379:6379

        steps:
            -   uses: actions/checkout@v4

            -   name: Set up Python
                uses: actions/setup-python@v5
                with:
                    python-version: "3.13"

            -   name: Install Dependencies
                run: |
                    python -m pip install --upgrade pip
                    pip install poetry
                    poetry install

            -   name: Run Migrations
                env:
                    POSTGRES_DB: test_db
                    POSTGRES_USER: user
                    POSTGRES_PASSWORD: password
                    POSTGRES_HOST: 127.0.0.1
                    POSTGRES_PORT: 5432
                    SECRET_KEY: temporary-secret-key
                run: |
                    poetry run python manage.py migrate

            -   name: Run Tests
                env:
                    POSTGRES_DB: test_db
                    POSTGRES_USER: user
                    POSTGRES_PASSWORD: password
                    POSTGRES_HOST: 127.0.0.1
                    POSTGRES_PORT: 5432
                    REDIS_URL: redis://localhost:6379/0
                    SECRET_KEY: temporary-secret-key
                run: |
                    poetry run python manage.py test

    docker-build:
        runs-on: ubuntu-latest
        needs: tests
        steps:
            -   uses: actions/checkout@v4
            -   name: Build Docker Image
                run: docker build . --file Dockerfile
