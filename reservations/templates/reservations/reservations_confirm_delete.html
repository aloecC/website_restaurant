{% extends 'restaurants/base.html' %}
{% block title %} Удаление брони {% endblock %}
{% block content %}
   <div class="container mt-5">
        <h3 class="mb-3">Удаление брони</h3>
        <p>Вы действительно хотите удалить?</p>
       <form method="post" action="{% url 'reservations:reservation_delete' reservation.pk %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"> Подтвердить </button>
            <a href="{% url 'reservations:reservation_list' %}" class="btn btn-outline-secondary btn-back"> Отменить </a>
        </form>
    </div>
{% endblock %}
