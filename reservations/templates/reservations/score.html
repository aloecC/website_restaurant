{% extends 'restaurants/base.html' %}

{% block title %}Оставить отзыв{% endblock %}

{% block content %}
<div class="contact-form-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8 mb-5">
        <div class="contact-card">
          <div class="contact-card-header text-center">
          </div>
          <div class="contact-card-body">
            <form method="post" action="">
              {% csrf_token %}

                <div class="mb-3">
                    <label for="score" class="form-label contact-label">Ждем вашу оценку (от 1 до 5)</label>
                    <input type="number"
                           class="form-control contact-input"
                           placeholder="1-5"
                           id="score"
                           name="score"
                           min="1"
                           max="5"
                           required>
                </div>

                <div class="mb-3">
                    <label for="comment_user" class="form-label contact-label">Ждем ваш комментарий</label>
                    <textarea id="comment_user"
                              name="comment_user"
                              class="form-control contact-input"
                              placeholder="Мне все понравилось, но..."
                              required
                              rows="3"></textarea>
                </div>

                <button type="submit" class="btn btn-steak-cta w-100 mt-3">Отправить</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>


{% endblock content %}
