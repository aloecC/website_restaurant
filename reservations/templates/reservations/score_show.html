{% extends 'restaurants/base.html' %}

{% block title %}Ваш отзыв на посещение{% endblock %}

{% block content %}
<div class="contact-form-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8 mb-5">
        <div class="contact-card">
          <div class="contact-card-body">
              <div> Ваша оценка: {{ score }}</div>
              <div>Ваш отзыв: {{ comment_user }} </div>
          </div>
        </div>
          <a href="{% url 'reservations:reservation_list' %}" class="btn btn-sm btn-outline-berloga w-100">Вернуться назад</a>
      </div>
    </div>
  </div>
</div>

{% endblock content %}
