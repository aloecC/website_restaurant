<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Берлога</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}?v={% now 'U' %}">
</head>

<nav class="navbar navbar-expand-sm forest-navbar">
  <div class="container mt-1">
    <div class="collapse navbar-collapse" id="forestNav">
      <ul class="navbar-nav mx-auto mx-3 mb-2 mb-lg-0">
        <li class="nav-item mx-3">
          <a href="#"> <span class="brand-icon mt-1"><img src="https://img.icons8.com/?size=100&id=2863&format=png" style="width: 40px; height: 40px;"></span></a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'events:events_actual_list' %}">Главная</a>
        </li>
        <li class="nav-item mx-3">
          <a class="nav-link" href="{% url 'reservations:reservation_list' %}">Мои брони</a>
        </li>
        <li class="nav-item mx-3">
          <a class="nav-link" href="{% url 'restaurants:menu' %}">Меню</a>
        </li>
        <li class="nav-item mx-3">
          <a class="nav-link" href="#"></a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'events:events_list' %}">События</a>
        </li>
        <li class="nav-item mx-3">
          <a class="nav-link" href="{% url 'restaurants:contacts' %}">Контакты</a>
        </li>
        <li class="nav-item mx-3">
          <a class="nav-link" href="{% url 'restaurants:about_us' %}">О нас</a>
        </li>
        {% if user.is_staff %}
        <li class="nav-item mx-3">
          <a class="nav-link" href="#"></a>
        </li>
        {% endif %}
      </ul>
      <ul class="navbar-nav mb-2 mx-3 mb-lg-0">

      </ul>
    </div>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#forestNav" aria-controls="forestNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

      <div class="d-flex align-items-center gap-3 ms-auto">
        {% if user.is_authenticated %}
          <a class="nav-link nav-link-auth mx-3" href="{% url 'users:user_profile' %}">Профиль</a>
          <form method="post" action="{% url 'users:logout' %}" class="m-0">
            {% csrf_token %}
            <button type="submit" class="btn btn-moss-sm btn btn-sm ">Выйти</button>
          </form>
        {% else %}
          <a class="nav-link nav-link-auth mx-3" href="{% url 'users:login' %}">Вход</a>
          <a class="btn btn-sm btn-moss-sm" href="{% url 'users:register' %}">Регистрация</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>
<div class="col-12 mt-2">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
