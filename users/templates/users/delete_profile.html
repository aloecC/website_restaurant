{% extends 'restaurants/base.html' %}

{% block title %} Удаление профиля {% endblock %}

{% block content %}
  <h2>Подтверждение удаления профиля</h2>
  <p>Вы уверены, что хотите удалить свой профиль? Это действие необратимо.</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit">Удалить профиль</button>
    <a href="{% url 'events:events_list' %}">Отмена</a>
  </form>
{% endblock %}
